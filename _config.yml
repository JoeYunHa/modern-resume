        description: |
          산업용 계측 시스템(NIMS) 데이터 통합 처리 데스크톱 앱 <mark>NIMS I/O Simulator</mark> 개발.

          - Electron · React · Python · C++ N-API Addon **4개 런타임** 멀티 아키텍처 설계 및 구현
          - 커스텀 바이너리 IPC 프로토콜 설계: 전송 크기 **61% 감소**, 역직렬화 **218× 향상**
          - DLL 비스레드 안전(non-thread-safe) 문제 → C++ 단일 워커 스레드 + TSFN 패턴으로 해결
