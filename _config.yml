about_content: |
  **성능 병목을 계측·분석·구조 재설계로 해결하는 신입 백엔드 개발자**입니다.

  Spring Boot · FastAPI 기반 REST API 설계, WebSocket 실시간 통신, AWS 클라우드 아키텍처를 직접 설계·구현했습니다.
  문제가 발생하면 데이터로 원인을 파악하고, 아키텍처 수준의 근본 해결을 지향합니다.

  - **주력 언어:** Java, Python
  - **Frameworks:** Spring Boot, FastAPI
  - **Cloud & Infra:** AWS (Lambda · EC2 · RDS · S3 · API Gateway), Docker, Nginx, Redis
  - **기타:** C++, JavaScript, TypeScript, WebSocket, SQL, Git

content:
  - title: Experience
    layout: list
    content:
      - layout: left
        border: weak
        title: RealGain
        sub_title: 기술 자문 계약직
        caption: 2026.02 - 2026.06
        additional_links:
          - title: JoeYunHa/realgain_5_BE
            icon: fab fa-github
            url: https://github.com/JoeYunHa/realgain_5_BE
        description: |
          원자력 발전소 RCP(Reactor Coolant Pump) 진동 감시 시스템 <mark>RCPVMS</mark> 개발.

          - **3계층 탐지 파이프라인:** 앙상블(ResNet18 + OrbitCNN1D) → OOD 탐지(max_conf + TV Distance) → MAE 재구성 오차(Transformer, 정상 데이터 단독 학습). 컴포넌트별 Graceful Degradation 설계
          - **물리 정보 인코딩:** 4채널 스펙트로그램 — Im(Gxy)(교차 스펙트럼 허수부)로 와류 방향 명시 인코딩. H-flip 증강 없이 순방향/역방향 와류 구분
          - **XAI:** Integrated Gradients(30-step) + GradCAM 히트맵으로 예측 근거 시각화
          - **Hot-standby 워커 풀:** Python inference daemon 사전 적재(콜드 스타트 비용 0), 워커 크래시 → 자동 재시작·idle 복귀. 동시 처리 1~4 구성
          - Grid Search 앙상블 가중치 최적화: 목적함수 `val_acc × (1 − ood_fp_rate)`

      - layout: left
        title: RealGain
        sub_title: 현장실습
        caption: 2026.01 - 2026.02
        additional_links:
